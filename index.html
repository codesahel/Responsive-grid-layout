<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Linking Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

    <title>Resposive Grid Layout</title>
    <!-- Internal Css -->
    <style>
        .grid-heading {
            display: flex;
            margin-left: 100px;
            margin-top: 30px;
            font-size: 3em;
            font-family: 'Montserrat', Courier, monospace;
            flex-shrink: 1;
    
        }

        .grid-container {
            background-color: salmon;
            border: 0px solid black;
        }

        .wrapper {
            display: grid;
            grid-gap: 10px;
            grid-template-columns: repeat(6, 150px);
            grid-template-rows: 150px 150px 150px;
            box-sizing: border-box;
            
        }

        .img1 {
            width: 100%;
            height: 100%;
        }

        .img2 {
            width: 100%;
            height: 100%;

        }

        .img3 {
            width: 100%;
            height: 100%;
        }

        .img4 {
            width: 100%;
            height: 100%;
        }

        @media screen and (max-width:900px){
            grid-template-columns: 150px 150px;
}
    </style>
</head>
<body>
   

    <div class="grid-heading">
        This is a responsive grid layout
    </div>
    
    <div class="grid-heading">
        <div class="wrapper">
            <div class="grid-container"><img src="photo 2.jpg" class="img2"></div>
            <div class="grid-container"><img src="photo 4.jpg" class="img4"></div>
            <div class="grid-container"><img src="photo3.jpg" class="img3"></div>
            <div class="grid-container"><img src="photo3.jpg" class="img3"></div>
            <div class="grid-container"><img src="photo 4.jpg" class="img4"></div>
            <div class="grid-container"><img src="photo1.jpg" class="img1"></div>
            <div class="grid-container"><img src="photo 4.jpg" class="img4"></div>
            <div class="grid-container"><img src="photo 4.jpg" class="img4"></div>
            <div class="grid-container"><img src="photo1.jpg" class="img1"></div>
            <div class="grid-container"><img src="photo1.jpg" class="img1"></div>
            <div class="grid-container"><img src="photo3.jpg" class="img3"></div>
            <div class="grid-container"><img src="photo3.jpg" class="img3"></div>

        </div>
    </div>

</body>

</html>
